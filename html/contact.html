<!-- ===== CONTACT SECTION ===== -->
<section class="contact section" id="contact">
  <div class="container">

    <!-- Section heading -->
    <div class="section-header">
      <h2>Get In Touch</h2>
      <div class="underline"></div>
    </div>

    <div class="contact-container">

      <!-- Contact form -->
      <div class="contact-form-wrapper">
        <form class="contact-form" id="contact-form" novalidate>
          <div class="form-group">
            <label for="fullname">Full Name</label>
            <input type="text" id="fullname" name="fullname" placeholder="Enter your full name" required>
            <small class="error-message"></small>
          </div>

          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="Enter your email address" required>
            <small class="error-message"></small>
          </div>

          <div class="form-group">
            <label for="subject">Subject</label>
            <input type="text" id="subject" name="subject" placeholder="Enter subject" required>
            <small class="error-message"></small>
          </div>

          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" rows="5" placeholder="Write your message here..." required></textarea>
            <small class="error-message"></small>
          </div>

          <button type="submit" class="btn btn-primary btn-block">
            <i class="fas fa-paper-plane"></i> Send Message
          </button>
        </form>
      </div>

      <!-- Contact info sidebar -->
      <div class="contact-info">

        <div class="contact-item">
          <div class="contact-icon">
            <i class="fas fa-envelope"></i>
          </div>
          <div class="contact-detail">
            <h4>Email</h4>
            <a href="mailto:omprakash@example.com">omprakash@example.com</a>
          </div>
        </div>

        <div class="contact-item">
          <div class="contact-icon">
            <i class="fas fa-phone-alt"></i>
          </div>
          <div class="contact-detail">
            <h4>Phone</h4>
            <a href="tel:+97798XXXXXXXX">+977-98XXXXXXXX</a>
          </div>
        </div>

        <div class="contact-item">
          <div class="contact-icon">
            <i class="fas fa-map-marker-alt"></i>
          </div>
          <div class="contact-detail">
            <h4>Location</h4>
            <p>Nepal</p>
          </div>
        </div>

        <!-- Social media links -->
        <div class="contact-social">
          <h4>Follow Me</h4>
          <div class="social-icons contact-social-icons">
            <a href="#" class="social-icon contact-social-icon" aria-label="GitHub"><i class="fab fa-github"></i></a>
            <a href="#" class="social-icon contact-social-icon" aria-label="LinkedIn"><i class="fab fa-linkedin-in"></i></a>
            <a href="#" class="social-icon contact-social-icon" aria-label="Facebook"><i class="fab fa-facebook-f"></i></a>
          </div>
        </div>

      </div>
    </div>

  </div>
</section>
